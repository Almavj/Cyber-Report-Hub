services:
  - type: web
    name: cyber-report-hub
    runtime: node
    plan: starter
    buildCommand: |
      npx pnpm@latest install --frozen-lockfile
      npx pnpm@latest --filter @workspace/api-server run build
      npx pnpm@latest --filter @workspace/bounty-hub run build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/bootstrap.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: cyber-report-hub
      - key: ALLOWED_ORIGINS
        sync: false
    healthCheckPath: /api/healthz
